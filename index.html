<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Basics -->
  <title>Furniture Designer - 3D Parametric Cabinet Design Tool</title>
  <meta name="description" content="Free open-source 3D parametric furniture and cabinet design tool. Automatically generate cut lists, panel optimization plans (bin packing), and 3D printable assembly jigs.">
  <meta name="keywords" content="furniture design, 3D modeling, cut list generator, woodworking, cabinet making, DIY, parametric design, cut plan optimizer, bin packing, dowel jigs">
  <meta name="author" content="Bewiwi">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://furniture.bibabox.fr/">
  <meta property="og:title" content="Furniture Designer - Free 3D Woodworking Tool">
  <meta property="og:description" content="Design your custom furniture in 3D directly in your browser. Get automatic cut lists and optimized panel layout plans.">
  <meta property="og:image" content="https://furniture.bibabox.fr/og-image.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://furniture.bibabox.fr/">
  <meta name="twitter:title" content="Furniture Designer - Free 3D Woodworking Tool">
  <meta name="twitter:description" content="Design your custom furniture in 3D directly in your browser. Get automatic cut lists and optimized panel layout plans.">
  <meta name="twitter:image" content="https://furniture.bibabox.fr/og-image.png">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪵</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header id="toolbar"></header>
    <main id="view-design">
      <div id="workspace">
        <aside id="tree-panel"></aside>
        <div id="tree-resizer" class="resizer horizontal"></div>
        <section id="viewer-panel">
          <div id="viewer-container"></div>
          <svg id="quotes-overlay" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-primary)" />
              </marker>
            </defs>
          </svg>
          <div id="objects-overlay-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden;"></div>
        </section>
        <div id="props-resizer" class="resizer horizontal"></div>
        <aside id="properties-panel"></aside>
      </div>
      <footer id="cutlist-panel"></footer>
    </main>
    <main id="view-cutlist" style="display: none;"></main>
    <main id="view-cutplan" style="display: none;"></main>
    <main id="view-tools" style="display: none;"></main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
